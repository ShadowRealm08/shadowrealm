        }

        .page-header {

    <script>
        // Use localStorage for message storage
        // This ensures messages are stored on the host device
        
        // Helper function to check localStorage availability
        function isLocalStorageAvailable() {
            try {
                const test = 'test';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch (e) {
                return false;
            }
        }
        
        // Check if localStorage is available
        const localStorageAvailable = isLocalStorageAvailable();
        if (!localStorageAvailable) {
            alert("Local storage is not available in your browser. The message board may not function properly.");
        }
        
        // Function to get device info for cross-platform identification
        function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const screenWidth = window.screen.width;
            const screenHeight = window.screen.height;
            
            return {
                userAgent,
                platform,
                screenWidth,
                screenHeight,
                timestamp: new Date().toISOString()
            };
        }
        
        // Store device info for cross-platform tracking
        if (localStorageAvailable) {
            const deviceInfo = getDeviceInfo();
            localStorage.setItem('deviceInfo', JSON.stringify(deviceInfo));
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            const isAuthenticated = localStorage.getItem('secretAuth') === 'true';
            if (!isAuthenticated) {
                // Redirect to login page if not authenticated
                window.location.href = 'secret-login.html';
                return;
            }

            // Get DOM elements
            const currentUserElement = document.getElementById('current-user');
            const logoutButton = document.getElementById('logout-button');
            const postButton = document.getElementById('post-button');
            const subjectInput = document.getElementById('message-subject');
            const contentInput = document.getElementById('message-content');
            const messagesContainer = document.getElementById('messages-container');
            const noMessagesElement = document.getElementById('no-messages');
            const photoUpload = document.getElementById('photo-upload');
            const videoUpload = document.getElementById('video-upload');
            const photoFileName = document.getElementById('photo-file-name');
            const videoFileName = document.getElementById('video-file-name');
            const mediaPreview = document.getElementById('media-preview');
            const scrollBottomButton = document.getElementById('scroll-bottom-button');
            
            // Store uploaded media files
            let uploadedMedia = [];

            // Set current username
            const username = localStorage.getItem('secretUsername') || 'Anonymous';
            currentUserElement.textContent = username;

            // Handle logout
            logoutButton.addEventListener('click', function() {
                try {
                    // Update user status to offline
                    let userStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                    
                    if (userStatuses[username]) {
                        userStatuses[username].online = false;
                        userStatuses[username].lastActive = new Date().toISOString();
                        localStorage.setItem('userStatuses', JSON.stringify(userStatuses));
                    }
                } catch (error) {
                    console.error("Error updating status during logout:", error);
                }
                
                // Remove auth from localStorage and redirect
                localStorage.removeItem('secretAuth');
                window.location.href = 'secret-login.html';
            });
            
            // Handle photo upload
            photoUpload.addEventListener('change', function(e) {
                handleFileUpload(e, 'image');
            });
            
            // Handle video upload
            videoUpload.addEventListener('change', function(e) {
                handleFileUpload(e, 'video');
            });
            
            // Function to handle file uploads
            function handleFileUpload(event, type) {
                const files = event.target.files;
                if (!files.length) return;
                
                // Update file name display
                const fileNameElement = type === 'image' ? photoFileName : videoFileName;
                fileNameElement.textContent = files.length > 1 ? `${files.length} files selected` : files[0].name;
                
                // Process each file
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const mediaData = {
                            type: type,
                            data: e.target.result,
                            file: file
                        };
                        
                        uploadedMedia.push(mediaData);
                        addMediaPreview(mediaData, uploadedMedia.length - 1);
                    };
                    
                    reader.readAsDataURL(file);
                }
            }
            
            // Function to add media preview
            function addMediaPreview(media, index) {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                previewItem.dataset.index = index;
                
                if (media.type === 'image') {
                    const img = document.createElement('img');
                    img.src = media.data;
                    previewItem.appendChild(img);
                } else if (media.type === 'video') {
                    const video = document.createElement('video');
                    video.src = media.data;
                    video.controls = true;
                    previewItem.appendChild(video);
                }
                
                const removeButton = document.createElement('button');
                removeButton.className = 'remove-preview';
                removeButton.innerHTML = '<i class="fas fa-times"></i>';
                removeButton.addEventListener('click', function() {
                    uploadedMedia.splice(index, 1);
                    mediaPreview.removeChild(previewItem);
                    
                    // Update all indices
                    const previewItems = mediaPreview.querySelectorAll('.preview-item');
                    previewItems.forEach((item, i) => {
                        item.dataset.index = i;
                    });
                });
                
                previewItem.appendChild(removeButton);
                mediaPreview.appendChild(previewItem);
            }
            
            // Function to create fullscreen media view
            function createFullscreenView(mediaElement) {
                const fullscreenDiv = document.createElement('div');
                fullscreenDiv.className = 'media-fullscreen';
                
                const closeButton = document.createElement('button');
                closeButton.className = 'close-fullscreen';
                closeButton.innerHTML = '<i class="fas fa-times"></i>';
                closeButton.addEventListener('click', function() {
                    document.body.removeChild(fullscreenDiv);
                });
                
                const mediaClone = mediaElement.cloneNode(true);
                if (mediaElement.tagName.toLowerCase() === 'video') {
                    mediaClone.controls = true;
                    mediaClone.autoplay = true;
                }
                
                fullscreenDiv.appendChild(closeButton);
                fullscreenDiv.appendChild(mediaClone);
                
                document.body.appendChild(fullscreenDiv);
            }

            // Load messages from board-msgs folder
            function loadMessages() {
                // Clear messages container
                messagesContainer.innerHTML = '';
                
                // Show loading indicator
                const loadingElement = document.createElement('div');
                loadingElement.className = 'loading-messages';
                loadingElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading messages...';
                messagesContainer.appendChild(loadingElement);
                
                try {
                    // Get messages from board-msgs folder
                    const messages = BoardMsgFS.getAllMessages();
                    
                    // Clear messages container
                    messagesContainer.innerHTML = '';
                    
                    if (messages.length === 0) {
                        messagesContainer.appendChild(noMessagesElement);
                        return;
                    }
                    
                    // Sort messages by date (newest first)
                    messages.sort((a, b) => new Date(b.date) - new Date(a.date));
                    
                    // Add messages to the container
                    messages.forEach((message, index) => {
                        const messageElement = createMessageElement(message, index);
                        messagesContainer.appendChild(messageElement);
                    });
                    
                    // Scroll to the bottom
                    scrollToBottom(true);
                    
                    // Update message count in title (for notifications when tab is not active)
                    document.title = `(${messages.length}) Secret Message Board - Shadow Realm`;
                } catch (error) {
                    console.error("Error loading messages:", error);
                    messagesContainer.innerHTML = '<div class="error-message">Error loading messages. Please refresh the page.</div>';
                }
            }

            // Create a message element
            function createMessageElement(message, index) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                messageDiv.dataset.index = index;
                messageDiv.dataset.id = message.id; // Store the message ID for deletion
                
                const messageHeader = document.createElement('div');
                messageHeader.className = 'message-header';
                
                const messageSubject = document.createElement('div');
                messageSubject.className = 'message-subject';
                messageSubject.textContent = message.subject;
                
                const messageInfo = document.createElement('div');
                messageInfo.className = 'message-info';
                
                const messageAuthor = document.createElement('span');
                messageAuthor.className = 'message-author';
                messageAuthor.textContent = `Posted by: ${message.author}`;
                
                const messageDate = document.createElement('span');
                messageDate.className = 'message-date';
                messageDate.textContent = formatDate(message.date);
                
                messageInfo.appendChild(messageAuthor);
                messageInfo.appendChild(messageDate);
                
                messageHeader.appendChild(messageSubject);
                messageHeader.appendChild(messageInfo);
                
                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                messageContent.textContent = message.content;
                
                // Add media if present
                if (message.media && message.media.length > 0) {
                    const mediaContainer = document.createElement('div');
                    mediaContainer.className = 'message-media';
                    
                    message.media.forEach(media => {
                        const mediaItem = document.createElement('div');
                        mediaItem.className = 'message-media-item';
                        
                        if (media.type === 'image') {
                            const img = document.createElement('img');
                            img.src = media.data;
                            img.alt = 'Shared image';
                            img.addEventListener('click', function() {
                                createFullscreenView(img);
                            });
                            mediaItem.appendChild(img);
                        } else if (media.type === 'video') {
                            const video = document.createElement('video');
                            video.src = media.data;
                            video.controls = true;
                            video.addEventListener('click', function(e) {
                                if (!e.target.controls) {
                                    createFullscreenView(video);
                                }
                            });
                            mediaItem.appendChild(video);
                        }
                        
                        mediaContainer.appendChild(mediaItem);
                    });
                    
                    messageContent.appendChild(mediaContainer);
                }
                
                const messageActions = document.createElement('div');
                messageActions.className = 'message-actions';
                
                // Only show delete button for messages by the current user
                if (message.author === username) {
                    const deleteButton = document.createElement('button');
                    deleteButton.className = 'action-button delete-button';
                    deleteButton.innerHTML = '<i class="fas fa-trash"></i>';
                    deleteButton.title = 'Delete message';
                    deleteButton.addEventListener('click', function() {
                        deleteMessage(index);
                    });
                    
                    messageActions.appendChild(deleteButton);
                }
                
                messageDiv.appendChild(messageHeader);
                messageDiv.appendChild(messageContent);
                messageDiv.appendChild(messageActions);
                
                return messageDiv;
            }

            // Format date to a readable string
            function formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleString();
            }

            // Post a new message
            postButton.addEventListener('click', function() {
                const subject = subjectInput.value.trim();
                const content = contentInput.value.trim();
                
                if (!subject || !content) {
                    alert('Please enter both subject and message content.');
                    return;
                }
                
                // Show loading indicator or disable button
                postButton.disabled = true;
                postButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Posting...';
                
                // Check if media is too large
                let mediaSizeOK = true;
                let totalMediaSize = 0;
                
                if (uploadedMedia.length > 0) {
                    uploadedMedia.forEach(media => {
                        totalMediaSize += media.data.length;
                    });
                    
                    // If total size is greater than ~5MB, warn the user
                    if (totalMediaSize > 5000000) {
                        mediaSizeOK = confirm("The media you're uploading is quite large and may cause performance issues. Continue anyway?");
                    }
                }
                
                if (!mediaSizeOK) {
                    postButton.disabled = false;
                    postButton.innerHTML = 'Post Message';
                    return;
                }
                
                // Check if we're approaching localStorage limits (typically ~5MB)
                try {
                    // Estimate current localStorage usage
                    let currentUsage = 0;
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        const value = localStorage.getItem(key);
                        currentUsage += (key.length + value.length) * 2; // Approximate size in bytes
                    }
                    
                    // Convert to MB
                    const currentUsageMB = currentUsage / (1024 * 1024);
                    
                    // If we're approaching 4MB (leaving some buffer), warn the user
                    if (currentUsageMB > 4) {
                        const proceed = confirm("Your local storage is getting full. You may need to delete some old messages to make room for new ones. Continue posting?");
                        if (!proceed) {
                            postButton.disabled = false;
                            postButton.innerHTML = 'Post Message';
                            return;
                        }
                    }
                } catch (e) {
                    console.warn("Could not check localStorage usage:", e);
                }
                
                const newMessage = {
                    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    subject: subject,
                    content: content,
                    author: username,
                    date: new Date().toISOString(),
                    media: uploadedMedia.length > 0 ? uploadedMedia : null,
                    deviceInfo: JSON.parse(localStorage.getItem('deviceInfo') || '{}')
                };
                
                // Function to clear form after posting
                const clearForm = () => {
                    subjectInput.value = '';
                    contentInput.value = '';
                    photoFileName.textContent = '';
                    videoFileName.textContent = '';
                    mediaPreview.innerHTML = '';
                    uploadedMedia = [];
                    
                    // Reset button
                    postButton.disabled = false;
                    postButton.innerHTML = 'Post Message';
                    
                    // Force check for scroll button visibility after a short delay
                    setTimeout(function() {
                        const scrollPosition = window.scrollY || document.documentElement.scrollTop;
                        const windowHeight = window.innerHeight;
                        const documentHeight = document.documentElement.scrollHeight;
                        
                        if (scrollPosition + windowHeight < documentHeight - 100) {
                            scrollBottomButton.classList.add('visible');
                        } else {
                            scrollBottomButton.classList.remove('visible');
                        }
                    }, 500);
                };
                
                // Save to board-msgs folder
                try {
                    // Save message to board-msgs folder
                    BoardMsgFS.saveMessage(newMessage);
                    
                    // Clear form
                    clearForm();
                    
                    // Reload messages
                    loadMessages();
                    
                    // Show success notification
                    showNotification('Message posted successfully!');
                } catch (error) {
                    console.error("Error saving to localStorage:", error);
                    
                    // Check if it's a quota exceeded error
                    if (error.name === 'QuotaExceededError' || error.code === 22 || error.code === 1014) {
                        alert("Storage limit exceeded. Please delete some old messages before posting new ones.");
                    } else {
                        alert("Error posting message. Please try again.");
                    }
                    
                    // Reset button
                    postButton.disabled = false;
                    postButton.innerHTML = 'Post Message';
                }
            });
            
            // Show a temporary notification
            function showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                document.body.appendChild(notification);
                
                // Fade in
                setTimeout(() => {
                    notification.classList.add('show');
                }, 10);
                
                // Remove after 3 seconds
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        document.body.removeChild(notification);
                    }, 300);
                }, 3000);
            }

            // Delete a message
            function deleteMessage(index) {
                if (confirm('Are you sure you want to delete this message?')) {
                    // Get the message element
                    const messageElement = document.querySelector(`.message[data-index="${index}"]`);
                    if (!messageElement) return;
                    
                    // Get the message ID from the element's dataset
                    const messageId = messageElement.dataset.id;
                    if (!messageId) {
                        showNotification('Cannot delete message: Missing ID');
                        return;
                    }
                    
                    try {
                        // Delete message from board-msgs folder
                        const success = BoardMsgFS.deleteMessage(messageId);
                        
                        if (success) {
                            // Reload messages
                            loadMessages();
                            
                            // Show success notification
                            showNotification('Message deleted successfully!');
                        } else {
                            showNotification('Message not found. It may have been deleted already.');
                        }
                    } catch (error) {
                        console.error("Error deleting message:", error);
                        showNotification('Error deleting message. Please try again.');
                    }
                }
            }

            // Function to scroll to bottom
            function scrollToBottom(smooth = true) {
                const behavior = smooth ? 'smooth' : 'auto';
                
                // First try to scroll to the last message
                if (messagesContainer.lastElementChild && messagesContainer.lastElementChild !== noMessagesElement) {
                    messagesContainer.lastElementChild.scrollIntoView({ behavior: behavior, block: 'end' });
                } else {
                    // If no messages, scroll to the bottom of the page
                    window.scrollTo({
                        top: document.documentElement.scrollHeight,
                        behavior: behavior
                    });
                }
            }
            
            // Scroll to bottom button functionality
            scrollBottomButton.addEventListener('click', function() {
                scrollToBottom(true);
            });
            
            // Show/hide scroll button based on scroll position
            window.addEventListener('scroll', function() {
                const scrollPosition = window.scrollY || document.documentElement.scrollTop;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                
                // Show button if not at the bottom
                if (scrollPosition + windowHeight < documentHeight - 100) {
                    scrollBottomButton.classList.add('visible');
                } else {
                    scrollBottomButton.classList.remove('visible');
                }
            });
            
            // Also check scroll position on window resize
            window.addEventListener('resize', function() {
                const scrollPosition = window.scrollY || document.documentElement.scrollTop;
                const windowHeight = window.innerHeight;
                const documentHeight = document.documentElement.scrollHeight;
                
                if (scrollPosition + windowHeight < documentHeight - 100) {
                    scrollBottomButton.classList.add('visible');
                } else {
                    scrollBottomButton.classList.remove('visible');
                }
            });
            
            // Initial load of messages
            loadMessages();
            
            // Make sure everything is properly loaded and scrolled
            window.addEventListener('load', function() {
                // Small delay to ensure all content is rendered
                setTimeout(function() {
                    scrollToBottom(false);
                }, 100);
            });
            
            // Update user status when page is loaded
            try {
                // Get or initialize user status data
                let userStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                
                // Update current user's status
                userStatuses[username] = {
                    online: true,
                    lastActive: new Date().toISOString(),
                    deviceInfo: JSON.parse(localStorage.getItem('deviceInfo') || '{}')
                };
                
                // Save updated statuses
                localStorage.setItem('userStatuses', JSON.stringify(userStatuses));
                
                // Update user status when page is closed or navigated away from
                window.addEventListener('beforeunload', function() {
                    // Get current statuses
                    let currentStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                    
                    // Update current user's status
                    currentStatuses[username] = {
                        online: false,
                        lastActive: new Date().toISOString(),
                        deviceInfo: JSON.parse(localStorage.getItem('deviceInfo') || '{}')
                    };
                    
                    // Save updated statuses
                    localStorage.setItem('userStatuses', JSON.stringify(currentStatuses));
                });
                
                // Periodically update "online" status to keep it fresh
                setInterval(function() {
                    try {
                        let currentStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                        currentStatuses[username] = {
                            online: true,
                            lastActive: new Date().toISOString(),
                            deviceInfo: JSON.parse(localStorage.getItem('deviceInfo') || '{}')
                        };
                        localStorage.setItem('userStatuses', JSON.stringify(currentStatuses));
                    } catch (e) {
                        console.warn("Error updating online status:", e);
                    }
                }, 60000); // Update every minute
            } catch (error) {
                console.error("Error setting up user status:", error);
            }
            
            // Display online users
            const onlineUsersCount = document.getElementById('online-users-count');
            const usersList = document.getElementById('users-list');
            const onlineUsersPanel = document.getElementById('online-users-panel');
            const closePanel = document.getElementById('close-panel');
            
            // Toggle online users panel
            onlineUsersCount.addEventListener('click', function() {
                onlineUsersPanel.classList.toggle('active');
                updateOnlineUsersList(); // Refresh the list when panel is opened
            });
            
            // Close panel button
            closePanel.addEventListener('click', function() {
                onlineUsersPanel.classList.remove('active');
            });
            
            // Function to update online users list
            function updateOnlineUsersList() {
                try {
                    // Get user statuses from localStorage
                    const userStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                    
                    // Consider users "online" if they've been active in the last 5 minutes
                    const now = new Date();
                    const fiveMinutesAgo = new Date(now.getTime() - 5 * 60 * 1000);
                    
                    // Filter for online users
                    const onlineUsers = Object.keys(userStatuses).filter(user => {
                        const userData = userStatuses[user];
                        if (userData.online) {
                            // If marked as online, check if last active time is recent
                            const lastActive = new Date(userData.lastActive);
                            return lastActive > fiveMinutesAgo;
                        }
                        return false;
                    });
                    
                    // Update online users count
                    onlineUsersCount.textContent = `${onlineUsers.length} online`;
                    
                    // Clear users list
                    usersList.innerHTML = '';
                    
                    // Add all users to the list
                    Object.keys(userStatuses).forEach(user => {
                        const userData = userStatuses[user];
                        const lastActive = new Date(userData.lastActive);
                        const isOnline = userData.online && lastActive > fiveMinutesAgo;
                        
                        const userItem = document.createElement('div');
                        userItem.className = 'user-item';
                        
                        const userStatus = document.createElement('div');
                        userStatus.className = `user-status ${isOnline ? 'status-online' : 'status-offline'}`;
                        
                        const userInfo = document.createElement('div');
                        userInfo.className = 'user-info';
                        
                        const userName = document.createElement('div');
                        userName.className = 'user-name';
                        userName.textContent = user + (user === username ? ' (You)' : '');
                        
                        const userLastActive = document.createElement('div');
                        userLastActive.className = 'user-last-active';
                        
                        if (isOnline) {
                            userLastActive.textContent = 'Online now';
                        } else {
                            // Format the last active time
                            userLastActive.textContent = `Last seen: ${formatDate(userData.lastActive)}`;
                        }
                        
                        // Add device info if available
                        if (userData.deviceInfo && userData.deviceInfo.platform) {
                            const deviceInfo = document.createElement('div');
                            deviceInfo.className = 'user-device-info';
                            deviceInfo.textContent = `Device: ${userData.deviceInfo.platform}`;
                            userInfo.appendChild(deviceInfo);
                        }
                        
                        userInfo.appendChild(userName);
                        userInfo.appendChild(userLastActive);
                        
                        userItem.appendChild(userStatus);
                        userItem.appendChild(userInfo);
                        
                        usersList.appendChild(userItem);
                    });
                    
                    // If no users, show a message
                    if (Object.keys(userStatuses).length === 0) {
                        const noUsers = document.createElement('div');
                        noUsers.className = 'no-users';
                        noUsers.textContent = 'No user data available';
                        usersList.appendChild(noUsers);
                    }
                } catch (error) {
                    console.error("Error updating online users:", error);
                    onlineUsersCount.textContent = "Error";
                    
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'error-message';
                    errorMsg.textContent = 'Error loading user data';
                    usersList.innerHTML = '';
                    usersList.appendChild(errorMsg);
                }
            }
            
            // Initial update of online users
            updateOnlineUsersList();
            
            // Periodically update the online users list
            setInterval(updateOnlineUsersList, 60000); // Update every minute
            
            // Storage Manager functionality
            const storageManagerButton = document.getElementById('storage-manager-button');
            const storageManager = document.getElementById('storage-manager');
            const closeStorageManager = document.getElementById('close-storage-manager');
            const storageUsageFill = document.getElementById('storage-usage-fill');
            const storageUsageText = document.getElementById('storage-usage-text');
            const clearOldMessagesButton = document.getElementById('clear-old-messages');
            const exportMessagesButton = document.getElementById('export-messages');
            const importMessagesButton = document.getElementById('import-messages');
            
            // Toggle storage manager panel
            storageManagerButton.addEventListener('click', function() {
                storageManager.classList.toggle('active');
                if (storageManager.classList.contains('active')) {
                    updateStorageUsage();
                }
            });
            
            // Close storage manager panel
            closeStorageManager.addEventListener('click', function() {
                storageManager.classList.remove('active');
            });
            
            // Update storage usage display
            function updateStorageUsage() {
                try {
                    // Calculate total localStorage usage
                    let totalSize = 0;
                    let messagesSize = 0;
                    
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        const value = localStorage.getItem(key);
                        const size = (key.length + value.length) * 2; // Approximate size in bytes
                        totalSize += size;
                        
                        if (key === 'secretMessages') {
                            messagesSize = size;
                        }
                    }
                    
                    // Convert to KB and MB for display
                    const totalKB = (totalSize / 1024).toFixed(2);
                    const totalMB = (totalSize / (1024 * 1024)).toFixed(2);
                    const messagesKB = (messagesSize / 1024).toFixed(2);
                    
                    // Estimate percentage of typical 5MB localStorage limit
                    const percentUsed = Math.min(100, (totalSize / (5 * 1024 * 1024)) * 100);
                    
                    // Update UI
                    storageUsageFill.style.width = `${percentUsed}%`;
                    storageUsageText.textContent = `${totalKB} KB used (${totalMB} MB) - Messages: ${messagesKB} KB`;
                    
                    // Change color based on usage
                    if (percentUsed > 80) {
                        storageUsageFill.style.backgroundColor = '#ff6b6b';
                    } else if (percentUsed > 60) {
                        storageUsageFill.style.backgroundColor = '#feca57';
                    } else {
                        storageUsageFill.style.backgroundColor = '#861a8e';
                    }
                } catch (error) {
                    console.error("Error calculating storage usage:", error);
                    storageUsageText.textContent = "Error calculating storage usage";
                }
            }
            
            // Clear old messages
            clearOldMessagesButton.addEventListener('click', function() {
                try {
                    // Get messages from board-msgs folder
                    let messages = BoardMsgFS.getAllMessages();
                    
                    if (messages.length === 0) {
                        alert("No messages to clear.");
                        return;
                    }
                    
                    // Ask user how many days of messages to keep
                    const daysToKeep = prompt("Keep messages from how many days? (Enter a number, e.g. 7 for one week)", "7");
                    if (daysToKeep === null) return; // User cancelled
                    
                    const days = parseInt(daysToKeep);
                    if (isNaN(days) || days < 0) {
                        alert("Please enter a valid number of days.");
                        return;
                    }
                    
                    // Calculate cutoff date
                    const now = new Date();
                    const cutoffDate = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
                    
                    // Filter messages
                    const oldMessages = messages.filter(msg => new Date(msg.date) < cutoffDate);
                    const newMessages = messages.filter(msg => new Date(msg.date) >= cutoffDate);
                    
                    if (oldMessages.length === 0) {
                        alert(`No messages older than ${days} days.`);
                        return;
                    }
                    
                    // Confirm with user
                    const confirmDelete = confirm(`This will delete ${oldMessages.length} messages older than ${days} days. Continue?`);
                    if (!confirmDelete) return;
                    
                    // Delete old messages from board-msgs folder
                    const deletedCount = BoardMsgFS.deleteOldMessages(days);
                    
                    // Update UI
                    updateStorageUsage();
                    loadMessages();
                    
                    // Show notification
                    showNotification(`Deleted ${deletedCount} old messages`);
                } catch (error) {
                    console.error("Error clearing old messages:", error);
                    alert("Error clearing old messages. Please try again.");
                }
            });
            
            // Export messages
            exportMessagesButton.addEventListener('click', function() {
                try {
                    // Get messages from board-msgs folder
                    const messages = BoardMsgFS.getAllMessages();
                    
                    if (messages.length === 0) {
                        alert("No messages to export.");
                        return;
                    }
                    
                    // Create export object with metadata
                    const exportData = {
                        version: "1.0",
                        timestamp: new Date().toISOString(),
                        deviceInfo: JSON.parse(localStorage.getItem('deviceInfo') || '{}'),
                        messages: messages
                    };
                    
                    // Convert to JSON string
                    const jsonString = JSON.stringify(exportData);
                    
                    // Create download link
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonString);
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", "shadow-realm-messages.json");
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                    
                    // Show notification
                    showNotification("Messages exported successfully");
                } catch (error) {
                    console.error("Error exporting messages:", error);
                    alert("Error exporting messages. Please try again.");
                }
            });
            
            // Import messages
            importMessagesButton.addEventListener('click', function() {
                try {
                    // Create file input
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = '.json';
                    fileInput.style.display = 'none';
                    document.body.appendChild(fileInput);
                    
                    fileInput.addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (!file) {
                            fileInput.remove();
                            return;
                        }
                        
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            try {
                                // Parse imported data
                                const importedData = JSON.parse(e.target.result);
                                
                                // Validate format
                                if (!importedData.messages || !Array.isArray(importedData.messages)) {
                                    throw new Error("Invalid file format");
                                }
                                
                                // Ask user how to handle import
                                const importOption = confirm("Do you want to merge with existing messages? Click OK to merge, or Cancel to replace all existing messages.");
                                
                                let messages = [];
                                if (importOption) {
                                    // Merge with existing messages
                                    const existingMessages = JSON.parse(localStorage.getItem('secretMessages')) || [];
                                    
                                    // Create a map of existing message IDs for quick lookup
                                    const existingIds = new Set();
                                    existingMessages.forEach(msg => {
                                        if (msg.id) existingIds.add(msg.id);
                                    });
                                    
                                    // Add imported messages that don't already exist
                                    importedData.messages.forEach(msg => {
                                        // If message has no ID or ID doesn't exist in current messages, add it
                                        if (!msg.id || !existingIds.has(msg.id)) {
                                            // Ensure it has an ID
                                            if (!msg.id) {
                                                msg.id = 'imported_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                                            }
                                            existingMessages.push(msg);
                                        }
                                    });
                                    
                                    messages = existingMessages;
                                } else {
                                    // Replace all messages
                                    messages = importedData.messages;
                                    
                                    // Ensure all messages have IDs
                                    messages.forEach(msg => {
                                        if (!msg.id) {
                                            msg.id = 'imported_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                                        }
                                    });
                                }
                                
                                // Import messages to board-msgs folder
                                BoardMsgFS.importMessages(importedData);
                                
                                // Update UI
                                updateStorageUsage();
                                loadMessages();
                                
                                // Show notification
                                showNotification(`Imported ${importedData.messages.length} messages successfully`);
                            } catch (error) {
                                console.error("Error processing import file:", error);
                                alert("Error importing messages. The file may be corrupted or in the wrong format.");
                            }
                            
                            fileInput.remove();
                        };
                        
                        reader.onerror = function() {
                            alert("Error reading file");
                            fileInput.remove();
                        };
                        
                        reader.readAsText(file);
                    });
                    
                    fileInput.click();
                } catch (error) {
                    console.error("Error importing messages:", error);
                    alert("Error importing messages. Please try again.");
                }
            });
            
            // Initial storage usage update
            updateStorageUsage();
        });
    </script>
