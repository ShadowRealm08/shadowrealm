<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Login to access the Shadow Realm secret message board">
    <title>Restricted Area - Shadow Realm</title>
    <script src="https://kit.fontawesome.com/380b381951.js" crossorigin="anonymous"></script>
    <link rel="icon" href="icons/favicon.ico" />
    <link rel="stylesheet" href="/icons/font-awesome/css/all.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: "Source Sans Pro", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .login-container {
            background-color: rgba(134, 26, 142, 0.2);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(134, 26, 142, 0.7);
            width: 350px;
            max-width: 90%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .page-title {
            color: #861a8e;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(134, 26, 142, 0.7);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #861a8e;
            border-radius: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 1em;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a020f0;
            box-shadow: 0 0 10px rgba(134, 26, 142, 0.7);
        }

        .submit-button {
            background-color: #861a8e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .submit-button:hover {
            background-color: #a020f0;
        }

        .error-message {
            color: #ff3333;
            margin-top: 15px;
            font-size: 0.9em;
            display: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #861a8e;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
        }

        .back-button:hover {
            background-color: #a020f0;
        }
        
        /* Home Button Styles */
        .home-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #861a8e;
            color: white;
            padding: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(134, 26, 142, 0.5);
            transition: background-color 0.3s, transform 0.3s;
            z-index: 100;
        }

        .home-button:hover {
            background-color: #a020f0;
            transform: scale(1.1);
        }

        /* Background effect */
        .matrix-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .matrix-column {
            position: absolute;
            top: -100px;
            color: #861a8e;
            font-family: monospace;
            font-size: 1.2em;
            text-shadow: 0 0 5px rgba(134, 26, 142, 0.7);
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
<!-- Source Protection Scripts --><script src="/JS/html-encryptor.js"></script></head>
<body>
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <a href="index.html" class="home-button" title="Back to Home">
        <i class="fas fa-home"></i>
    </a>

    <div class="matrix-background" id="matrix-bg">
        <!-- Matrix effect will be generated by JavaScript -->
    </div>

    <div class="login-container">
        <h1 class="page-title">Restricted Area</h1>
        <div class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button id="login-button" class="submit-button">Enter</button>
            <div id="error-message" class="error-message">Incorrect username or password.</div>
        </div>
    </div>

    <script>
        // Helper function to check localStorage availability
        function isLocalStorageAvailable() {
            try {
                const test = 'test';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch (e) {
                return false;
            }
        }
        
        // Function to get device info for cross-platform identification
        function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const screenWidth = window.screen.width;
            const screenHeight = window.screen.height;
            
            return {
                userAgent,
                platform,
                screenWidth,
                screenHeight,
                timestamp: new Date().toISOString()
            };
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // Check if localStorage is available
            if (!isLocalStorageAvailable()) {
                alert("Local storage is not available in your browser. The message board may not function properly.");
            }
            
            // Check if already authenticated
            if (localStorage.getItem('secretAuth') === 'true') {
                window.location.href = 'secret-board.html';
                return;
            }
            
            // Matrix background effect
            const matrixBg = document.getElementById('matrix-bg');
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+-=[]{}|;:,.<>?';
            const columnCount = Math.floor(window.innerWidth / 20);
            
            for (let i = 0; i < columnCount; i++) {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                column.style.left = `${i * 20}px`;
                
                const columnHeight = Math.floor(Math.random() * 20) + 10;
                for (let j = 0; j < columnHeight; j++) {
                    const char = document.createElement('div');
                    char.textContent = characters.charAt(Math.floor(Math.random() * characters.length));
                    column.appendChild(char);
                }
                
                column.style.animationDuration = `${Math.random() * 10 + 5}s`;
                matrixBg.appendChild(column);
            }
            
            // Periodically change characters
            setInterval(() => {
                const matrixChars = document.querySelectorAll('.matrix-column div');
                matrixChars.forEach(char => {
                    if (Math.random() > 0.98) {
                        char.textContent = characters.charAt(Math.floor(Math.random() * characters.length));
                    }
                });
            }, 100);
            
            // Login functionality
            const loginButton = document.getElementById('login-button');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('error-message');
            
            // Set the correct credentials - multiple users
            const validUsers = [
                { username: 'admin', password: 'shadow2025' },
                { username: 'GothJesus', password: 'Brown622' }
            ];
            
            loginButton.addEventListener('click', function() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                
                // Check if credentials match any valid user
                const validUser = validUsers.find(user => 
                    user.username === username && user.password === password
                );
                
                if (validUser) {
                    // Store device info
                    const deviceInfo = getDeviceInfo();
                    localStorage.setItem('deviceInfo', JSON.stringify(deviceInfo));
                    
                    // Store authentication in localStorage
                    localStorage.setItem('secretAuth', 'true');
                    localStorage.setItem('secretUsername', username);
                    localStorage.setItem('lastLogin', new Date().toISOString());
                    
                    // Initialize or update user statuses
                    let userStatuses = JSON.parse(localStorage.getItem('userStatuses')) || {};
                    userStatuses[username] = {
                        online: true,
                        lastActive: new Date().toISOString(),
                        deviceInfo: deviceInfo
                    };
                    localStorage.setItem('userStatuses', JSON.stringify(userStatuses));
                    
                    // Redirect to the secret page
                    window.location.href = 'secret-board.html';
                } else {
                    // Show error message
                    errorMessage.style.display = 'block';
                    passwordInput.value = '';
                    
                    // Hide error message after 3 seconds
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 3000);
                }
            });
            
            // Allow Enter key to submit
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginButton.click();
                }
            });
        });
    </script>
